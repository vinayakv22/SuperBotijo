version: "3.8"

# ===========================================================================
# SuperBotijo - CasaOS Configuration
# ===========================================================================
# This docker-compose file is optimized for CasaOS integration.
#
# Quick Start:
# 1. Copy this file to your CasaOS apps directory
# 2. Create a .env file with ADMIN_PASSWORD and AUTH_SECRET
# 3. Import via CasaOS App Store → Custom Install
#
# ===========================================================================

services:
  superbotijo:
    # Docker image
    image: ghcr.io/vinayakv22/superbotijo:latest
    container_name: superbotijo
    hostname: superbotijo
    restart: unless-stopped

    # Network configuration
    # CasaOS typically uses bridge networking
    networks:
      - superbotijo-network
    ports:
      - "3000:3000"

    # Environment variables
    # IMPORTANT: Set ADMIN_PASSWORD and AUTH_SECRET in CasaOS UI or .env file
    environment:
      # ========== REQUIRED ==========
      # Set these in CasaOS environment variables section
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}

      # ========== OpenClaw Integration ==========
      # Adjust these paths to match your OpenClaw installation
      - OPENCLAW_DIR=${OPENCLAW_DIR:-/DATA/AppData/openclaw}
      - OPENCLAW_WORKSPACE=${OPENCLAW_WORKSPACE:-/DATA/AppData/openclaw/workspace}

      # ========== Weather Widget (Optional) ==========
      - WEATHER_LAT=${WEATHER_LAT:-40.4168}
      - WEATHER_LON=${WEATHER_LON:-3.7038}
      - WEATHER_CITY=${WEATHER_CITY:-Madrid}
      - WEATHER_TIMEZONE=${WEATHER_TIMEZONE:-Europe/Madrid}

      # ========== Branding (Optional) ==========
      - NEXT_PUBLIC_AGENT_NAME=${NEXT_PUBLIC_AGENT_NAME:-SuperBotijo}
      - NEXT_PUBLIC_AGENT_EMOJI=${NEXT_PUBLIC_AGENT_EMOJI:-🫙}
      - NEXT_PUBLIC_AGENT_DESCRIPTION=${NEXT_PUBLIC_AGENT_DESCRIPTION:-Your AI co-pilot, powered by OpenClaw}
      - NEXT_PUBLIC_AGENT_LOCATION=${NEXT_PUBLIC_AGENT_LOCATION:-}
      - NEXT_PUBLIC_BIRTH_DATE=${NEXT_PUBLIC_BIRTH_DATE:-}
      - NEXT_PUBLIC_AGENT_AVATAR=${NEXT_PUBLIC_AGENT_AVATAR:-}
      - NEXT_PUBLIC_OWNER_USERNAME=${NEXT_PUBLIC_OWNER_USERNAME:-your-username}
      - NEXT_PUBLIC_OWNER_EMAIL=${NEXT_PUBLIC_OWNER_EMAIL:-your-email@example.com}
      - NEXT_PUBLIC_OWNER_COLLAB_EMAIL=${NEXT_PUBLIC_OWNER_COLLAB_EMAIL:-collabs@example.com}
      - NEXT_PUBLIC_TWITTER_HANDLE=${NEXT_PUBLIC_TWITTER_HANDLE:-@username}
      - NEXT_PUBLIC_COMPANY_NAME=${NEXT_PUBLIC_COMPANY_NAME:-SUPERBOTIJO, INC.}
      - NEXT_PUBLIC_APP_TITLE=${NEXT_PUBLIC_APP_TITLE:-SuperBotijo}

      # ========== Agent Integration (Optional) ==========
      - KANBAN_AGENT_KEYS=${KANBAN_AGENT_KEYS:-}

      # Production mode
      - NODE_ENV=production

    # Volume mounts
    volumes:
      # OpenClaw directory (read-write access)
      # Default CasaOS AppData location: /DATA/AppData/openclaw
      # Adjust to your OpenClaw installation path
      - ${OPENCLAW_DIR:-/DATA/AppData/openclaw}:/openclaw:rw

      # SuperBotijo data (SQLite databases and JSON files)
      # Uses named volume for persistence
      - superbotijo-data:/app/data

    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # CasaOS-specific labels
    labels:
      # App metadata
      - "icon=https://raw.githubusercontent.com/vinayakv22/SuperBotijo/main/public/icon.png"
      - "name=SuperBotijo"
      - "description=SuperBotijo - OpenClaw Dashboard. Real-time monitoring and control center for OpenClaw AI agents."
      - "tagline=AI Agent Dashboard"
      - "category=Dashboard"

      # CasaOS UI labels
      - "casaos.app.name=SuperBotijo"
      - "casaos.app.title=SuperBotijo Dashboard"
      - "casaos.app.author=SuperBotijo Team"
      - "casaos.app.category=Dashboard"
      - "casaos.app.port=3000"
      - "casaos.app.index=/login"
      - "casaos.app.thumbnail=https://raw.githubusercontent.com/vinayakv22/SuperBotijo/main/docs/screenshots/dashboard.jpg"

      # Version and metadata
      - "com.superbotijo.version=1.0.0"
      - "com.superbotijo.description=SuperBotijo - OpenClaw Dashboard"
      - "com.superbotijo.vendor=SuperBotijo"

      # Network labels
      - "homepage.group=Monitoring"
      - "homepage.name=SuperBotijo"
      - "homepage.icon=mdi-robot"
      - "homepage.href=http://localhost:3000"
      - "homepage.description=OpenClaw AI Agent Dashboard"

      # Traefik labels (if using reverse proxy)
      - "traefik.enable=false"

# Networks
networks:
  superbotijo-network:
    driver: bridge
    labels:
      - "com.superbotijo.network=true"

# Named volumes
volumes:
  superbotijo-data:
    driver: local
    labels:
      - "com.superbotijo.volume=data"
      - "com.superbotijo.description=SuperBotijo application data (SQLite databases and JSON files)"

# ===========================================================================
# CASAOS INSTALLATION NOTES
# ===========================================================================
#
# 1. Generate Secrets (on your server):
#    docker run --rm alpine sh -c "head -c 32 /dev/urandom | base64"
#    docker run --rm alpine sh -c "head -c 24 /dev/urandom | base64"
#
# 2. Set Environment Variables in CasaOS:
#    - ADMIN_PASSWORD: Your secure password
#    - AUTH_SECRET: 32-character random string
#    - OPENCLAW_DIR: Path to your OpenClaw installation
#
# 3. Access SuperBotijo:
#    http://your-server-ip:3000
#    Login with your ADMIN_PASSWORD
#
# 4. For HTTPS (optional):
#    Set up a reverse proxy (Caddy/nginx) in CasaOS
#
# ===========================================================================
